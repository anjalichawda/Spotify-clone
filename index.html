<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Wave - Music Player with Lyrics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orb accent"></div>
    <div class="bg-orb blue"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">🎵 LYRIC WAVE</div>
        <ul class="nav-links">
            <a href="#" onclick="showPage('home')" class="nav-link active">HOME</a>
            <a href="#" onclick="showPage('explore')" class="nav-link">EXPLORE</a>
            <a href="#" onclick="showPage('library')" class="nav-link">MY LIBRARY</a>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- HOME PAGE -->
        <div id="homePage" class="active">
            <!-- Left: Search & Song List -->
            <div>
                <div class="suggestions">
                    <span>Try:</span>
                    <button class="genre-btn" onclick="searchGenre('Pop')">Pop</button>
                    <button class="genre-btn" onclick="searchGenre('Rock')">Rock</button>
                    <button class="genre-btn" onclick="searchGenre('Jazz')">Jazz</button>
                    <button class="genre-btn" onclick="searchGenre('Hip-Hop')">Hip-Hop</button>
                </div>
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Search songs..." />
                    <button class="search-btn" onclick="searchSongs()">Search</button>
                </div>
                <div id="categoryContainer"></div>
                <div id="resultsInfo"></div>
                <div id="songList"></div>
            </div>
        </div>

        <!-- EXPLORE PAGE -->
        <div id="explorePage">
            <h2 style="margin-bottom: 28px; font-size: 24px; font-family: 'Bebas Neue';">Top Songs</h2>
            <div id="trendingContainer"></div>
        </div>

        <!-- shared lyrics panel moved outside of page-specific containers -->
        <div id="lyricsPanel">
            <div class="lyrics-header">🎤 LYRICS</div>
            <div id="lyricsBox">
                <div class="lyrics-loading"><span class="spinner"></span>Search or play a song to view lyrics</div>
            </div>
        </div>

        <!-- LIBRARY PAGE -->
        <div id="libraryPage">
            <div class="library-container">
                <div class="folder-list" id="folderList">
                    <div class="folder-header">
                        <span style="font-size:14px;color:var(--text);font-weight:600;">Playlists</span>
                        <button class="add-btn" onclick="createPlaylist()" title="New playlist">+</button>
                    </div>
                    <!-- folders inserted here -->
                </div>
                <div class="folder-content">
                    <h2 id="libraryHeader" style="margin-bottom: 28px; font-size: 24px; font-family: 'Bebas Neue';">Favorites ❤️</h2>
                    <div id="libraryList"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Player (Fixed at Bottom) -->
    <div class="player">
        <div class="player-cover">
            <img id="coverLarge" src="" alt="Album Art" />
        </div>

        <div class="player-info">
            <div class="player-meta">
                <div id="playerName">Select a song</div>
                <div id="playerArtist">to get started</div>
            </div>

            <div class="player-controls">
                <button class="control-btn" id="prevBtn" onclick="prevSong()" title="Previous">⏮</button>
                <button class="control-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶</button>
                <button class="control-btn" id="nextBtn" onclick="nextSong()" title="Next">⏭</button>
                <div class="volume-control">
                    <span style="font-size: 14px;">🔊</span>
                    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8" />
                </div>
            </div>

            <div class="progress-section">
                <input type="range" id="progressBar" min="0" max="100" value="0" />
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audioPlayer"></audio>

    <!-- Modal Overlay for custom dialogs -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button id="modalCancel" class="add-btn">Cancel</button>
                <button id="modalOk" class="add-btn">OK</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
